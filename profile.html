<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alpha Arena - My Profile</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
html, body { background-color: #080710; color: #e5e7eb; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
body { display: flex; justify-content: center; align-items: flex-start; }
.app-container { width: 100%; max-width: 380px; height: 100vh; background-color: #111827; padding: 15px; padding-bottom: 100px; overflow-y: scroll; overflow-x: hidden; -webkit-overflow-scrolling: touch; }

/*       */
.header-bar { display: flex; align-items: center; justify-content: space-between; background-color: #1f2937; padding: 12px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #374151; }
.back-btn { background: #374151; color: #38bdf8; border: none; padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
.header-title { font-size: 16px; font-weight: 800; color: #ffffff; text-transform: uppercase; }

/*     */
.profile-card { background: linear-gradient(135deg, #1f2937, #111827); padding: 20px; border-radius: 16px; text-align: center; border: 1px solid #374151; margin-bottom: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
.avatar { width: 70px; height: 70px; background-color: #a855f7; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; margin: 0 auto 12px auto; border: 2px solid #c084fc; color: white; }
.user-name { font-size: 18px; font-weight: bold; color: #ffffff; margin-bottom: 4px; }
.user-phone { font-size: 13px; color: #9ca3af; font-family: monospace; }

/*     */
.wallet-box { background: linear-gradient(135deg, #10b981, #059669); padding: 16px; border-radius: 14px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #34d399; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
.wallet-left p { font-size: 12px; color: #d1fae5; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
.wallet-left h2 { font-size: 24px; font-weight: 800; color: white; font-family: monospace; margin-top: 2px; }

/*      */
.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
.action-btn { padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; color: white; cursor: pointer; text-transform: uppercase; transition: 0.2s; text-align: center; text-decoration: none; }
.action-btn:active { transform: scale(0.95); }
.btn-deposit { background: linear-gradient(135deg, #0ea5e9, #0284c7); border: 1px solid #38bdf8; }
.btn-withdraw { background: linear-gradient(135deg, #f59e0b, #d97706); border: 1px solid #fbbf24; }

/*     */
.menu-list { background-color: #030712; border: 1px solid #1f2937; border-radius: 14px; padding: 6px; margin-bottom: 25px; }
.menu-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 12px; border-bottom: 1px solid #1f2937; text-decoration: none; color: #e5e7eb; font-size: 14px; font-weight: 600; cursor: pointer; }
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background-color: #111827; border-radius: 8px; }
.menu-left { display: flex; align-items: center; gap: 10px; }
.menu-icon { font-size: 16px; }
.arrow-right { color: #4b5563; font-weight: bold; }

/*     */
.logout-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #ef4444, #dc2626); border: 1px solid #f87171; border-radius: 12px; color: white; font-size: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.2s; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2); margin-bottom: 30px; }
.logout-btn:active { transform: scale(0.96); }
</style>
</head>
<body>

<div class="app-container">
    <!--   -->
    <div class="header-bar">
        <button class="back-btn" onclick="location.href='templates_dashboard.html'"> BACK</button>
        <span class="header-title">My Account</span>
        <div style="width: 50px;"></div>
    </div>

    <!--    -->
    <div class="profile-card">
        <div class="avatar"></div>
        <div id="profName" class="user-name">Arena Player</div>
        <div id="profPhone" class="user-phone">99927888757</div>
        <div style="font-size: 12px; color: #a855f7; font-weight: bold; margin-top: 6px;">UID: <span id="profUID" style="font-family: monospace;">00000000</span></div>
    </div>

    <!--    -->
    <div class="wallet-box">
        <div class="wallet-left">
            <p>Total Balance</p>
            <h2 id="profBalance">0.00</h2>
        </div>
    </div>

    <!--     -->
    <div class="action-grid">
        <button class="action-btn btn-deposit" onclick="alert('Opening Deposit Section...')"> Deposit</button>
        <button class="action-btn btn-withdraw" onclick="alert('Opening Withdraw Section...')"> Withdraw</button>
    </div>

    <!--   -->
    <div class="menu-list">
        <div class="menu-item" onclick="alert('Opening Bet History...')">
            <div class="menu-left"><span class="menu-icon"></span><span>Bet History</span></div>
            <span class="arrow-right"></span>
        </div>
        <div class="menu-item" onclick="alert('Opening Transaction Logs...')">
            <div class="menu-left"><span class="menu-icon"></span><span>Transaction Logs</span></div>
            <span class="arrow-right"></span>
        </div>
        <div class="menu-item" onclick="location.href='refer.html'">
            <div class="menu-left"><span class="menu-icon"></span><span>Refer & Earn</span></div>
            <span class="arrow-right"></span>
        </div>
        <div class="menu-item" onclick="alert('Connecting to Customer Support...')">
            <div class="menu-left"><span class="menu-icon"></span><span>Customer Support</span></div>
            <span class="arrow-right"></span>
        </div>
    </div>

    <!--        -->
    <button class="logout-btn" onclick="handleUserLogout()">Log Out ()</button>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // 1.    (Session)      
        const storedUser = sessionStorage.getItem("userData");
        
        if (storedUser) {
            const userData = JSON.parse(storedUser);
            
            // 2.        
            if (userData.first_name) {
                document.getElementById("profName").innerText = userData.first_name;
            }
            if (userData.mobile) {
                document.getElementById("profPhone").innerText = userData.mobile;
            }
            if (userData.uid) {
    document.getElementById("profUID").innerText = userData.uid;
}

            if (userData.balance !== undefined) {
                document.getElementById("profBalance").innerText = `${parseFloat(userData.balance).toFixed(2)}`;
            }
        } else {
            //    (        )
            console.log("   !");
            document.getElementById("profBalance").innerText = "50.00";
        }
    });

    //  100%       
    function handleUserLogout() {
        //    
        const confirmLogout = confirm("     Account Logout ");
        
        if (confirmLogout) {
            // :   (Session)        (Clear) 
            sessionStorage.clear();
            
            //          
            alert("     confirm");
            window.location.href = "index.html";
        }
    }
</script>
</body>
</html>
