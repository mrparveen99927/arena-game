<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Arena - Lucky Spin</title>
    <style>
        /*            */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        html, body { background-color: #030712; color: #f9fafb; width: 100%; min-height: 100vh; overflow-x: hidden; }
        body { display: flex; flex-direction: column; align-items: center; padding: 15px; }
        
        .wheel-page-wrapper { width: 100%; max-width: 440px; background-color: #111827; padding: 15px; border-radius: 16px; border: 1px solid #374151; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }

        /*    ,     */
        .wheel-header-card { display: flex; align-items: center; justify-content: space-between; background-color: #1f2937; padding: 12px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #374151; }
        .back-dashboard-btn { background: #111827; border: 1px solid #374151; color: white; padding: 6px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; text-transform: uppercase; }
        .back-dashboard-btn:hover { background: #1f2937; }
        .wheel-header-title { font-size: 15px; font-weight: 800; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px; }
        .wheel-wallet-display { background: #030712; border: 1px solid #374151; padding: 6px 12px; border-radius: 20px; font-weight: 700; color: #4ade80; font-size: 13px; }

        /*         */
        .wheel-outer-box { position: relative; width: 280px; height: 280px; margin: 25px auto; border-radius: 50%; border: 6px solid #eab308; box-shadow: 0 0 20px rgba(234, 179, 8, 0.3), inset 0 0 15px rgba(0,0,0,0.6); overflow: hidden; background: #0b0f19; }
        .canvas-wheel-render { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1); }
        
        /*       (Pointer) */
        .wheel-top-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 25px solid #ef4444; z-index: 10; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5)); }
        
        /*      */
        .spin-trigger-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 64px; height: 64px; background: linear-gradient(135deg, #eab308, #ca8a04); border: 3px solid #ffffff; border-radius: 50%; color: #030712; font-size: 13px; font-weight: 800; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5), 0 0 10px rgba(234, 179, 8, 0.4); z-index: 12; outline: none; transition: transform 0.1s; }
        .spin-trigger-btn:active { transform: translate(-50%, -50%) scale(0.95); }
        .spin-trigger-btn:disabled { background: #374151 !important; border-color: #4b5563 !important; color: #9ca3af !important; cursor: not-allowed; box-shadow: none !important; }

        /*         */
        .wheel-cost-banner { font-size: 12px; color: #9ca3af; font-weight: bold; margin-top: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        .wheel-cost-banner span { color: #eab308; font-size: 14px; }
    </style>
</head>
<body>
    <div class="wheel-page-wrapper">
        
        <!--    ,     -->
        <div class="wheel-header-card">
            <button class="back-dashboard-btn" onclick="window.location.href='templates_dashboard.html'"> Back</button>
            <span class="wheel-header-title">Lucky Spin</span>
            <span class="wheel-wallet-display">Wallet: <span id="wheelWalletBal">50.00</span></span>
        </div>

        <!--         -->
        <div style="position: relative; width: 280px; height: 280px; margin: 20px auto;">
            <div class="wheel-top-pointer"></div>
            
            <div class="wheel-outer-box">
                <!--     -->
                <canvas class="canvas-wheel-render" id="wheelCanvas" width="280" height="280"></canvas>
            </div>
            
            <button class="spin-trigger-btn" id="spinActionBtn" onclick="startLuckySpinEngine()">Spin</button>
        </div>

        <!--       -->
        <div class="wheel-cost-banner">
               : <span>10.00</span>
        </div>

    </div>

    <script>
        const BACKEND_URL = "https://arena-backen.onrender.com";
        const SPIN_COST = 10; 
        
        //      8  (1  500 )
        const prizes = [
            { text: "1", color: "#1f2937", minWin: 1, maxWin: 1 },
            { text: "5", color: "#6366f1", minWin: 5, maxWin: 5 },
            { text: "7", color: "#3b82f6", minWin: 7, maxWin: 7 }, //     
            { text: "10", color: "#a855f7", minWin: 10, maxWin: 10 },
            { text: "50", color: "#06b6d4", minWin: 50, maxWin: 50 },
            { text: "100", color: "#22c55e", minWin: 100, maxWin: 100 },
            { text: "200", color: "#f59e0b", minWin: 200, maxWin: 200 },
            { text: "500", color: "#ef4444", minWin: 500, maxWin: 500 }
        ];

        const numSegments = prizes.length;
        const segmentAngle = 360 / numSegments;
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        let currentRotation = 0;
        let isSpinning = false;

        //              
        function drawLuckyWheel() {
            const center = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < numSegments; i++) {
                const angleStart = (i * segmentAngle * Math.PI) / 180;
                const angleEnd = ((i + 1) * segmentAngle * Math.PI) / 180;
                
                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.arc(center, center, center - 2, angleStart, angleEnd);
                ctx.fillStyle = prizes[i].color;
                ctx.fill();
                ctx.strokeStyle = "#374151";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(angleStart + (segmentAngle * Math.PI) / 360);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 13px sans-serif";
                ctx.fillText(prizes[i].text, center - 25, 5);
                ctx.restore();
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const sessionData = sessionStorage.getItem("userData");
            let balanceVal = 50.00;
            if (sessionData) {
                balanceVal = parseFloat(JSON.parse(sessionData).balance);
            }
            document.getElementById("wheelWalletBal").innerText = " can_sym_0" + balanceVal.toFixed(2);
            drawLuckyWheel();
        });

        //     (  0, 1,  2     1, 5, 7)
        async function startLuckySpinEngine() {
            if (isSpinning) return;
            
            let userData = JSON.parse(sessionStorage.getItem("userData")) || { balance: 50.00 };

            if (userData.balance < SPIN_COST) {
                alert("  !        10  ");
                return;
            }

            isSpinning = true;
            document.getElementById("spinActionBtn").disabled = true;

            //     
            userData.balance = userData.balance - SPIN_COST;
            sessionStorage.setItem("userData", JSON.stringify(userData));
            document.getElementById("wheelWalletBal").innerText = " can_sym_0" + userData.balance.toFixed(2);

            //  [  ]:     3  (1, 5, 7)       
            const safeIndexes =; 
            const targetIndex = safeIndexes[Math.floor(Math.random() * safeIndexes.length)];

            //    (270 )       
            const targetAngle = 270 - (targetIndex * segmentAngle) - (segmentAngle / 2);
            const totalSpinsAngle = 360 * 5; 
            currentRotation = totalSpinsAngle + targetAngle;

            const wheelCanvas = document.getElementById("wheelCanvas");
            wheelCanvas.style.transform = "rotate(" + currentRotation + "deg)";

            setTimeout(() => {
                const finalPrize = prizes[targetIndex];
                let prizeVal = parseFloat(finalPrize.text.replace(" can_sym_0", ""));
                
                //     
                userData.balance += prizeVal;
                sessionStorage.setItem("userData", JSON.stringify(userData));
                document.getElementById("wheelWalletBal").innerText = " can_sym_0" + userData.balance.toFixed(2);
                
                alert("  !     " + finalPrize.text + "   ");

                isSpinning = false;
                document.getElementById("spinActionBtn").disabled = false;
                
                const normalizedAngle = currentRotation % 360;
                wheelCanvas.style.transition = "none";
                wheelCanvas.style.transform = "rotate(" + normalizedAngle + "deg)";
                setTimeout(() => {
                    wheelCanvas.style.transition = "transform 4s cubic-bezier(0.25, 0.1, 0.25, 1)";
                }, 50);

            }, 4000);
        }
    </script>
</body>
</html>
