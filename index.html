<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N&N Alpha Arena - Login & Register</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body { 
            background-color: #080710; 
            color: #e5e7eb; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 15px;
            overflow-x: hidden;
        }
        
        .container { 
            width: 100%; 
            max-width: 380px; 
            background-color: #111827; 
            padding: 24px; 
            border-radius: 20px; 
            border: 1px solid #1f2937; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
            text-align: center; 
        }
        
        .logo { font-size: 45px; margin-bottom: 8px; display: block; }
        h1 { font-size: 22px; font-weight: 900; letter-spacing: 1px; color: #ffffff; margin-bottom: 4px; }
        .tagline { font-size: 10px; color: #a855f7; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        h2 { font-size: 16px; color: #a855f7; text-align: left; margin-bottom: 15px; }
        .form-group { margin-bottom: 14px; text-align: left; width: 100%; }
        label { display: block; font-size: 11px; color: #9ca3af; margin-bottom: 4px; font-weight: 600; }
        
        input { 
            width: 100%; 
            background-color: #030712; 
            border: 1px solid #1f2937; 
            border-radius: 12px; 
            padding: 12px; 
            font-size: 14px; 
            color: #ffffff; 
            outline: none; 
            -webkit-appearance: none;
        }
        input:focus { border-color: #a855f7; }
        
        .grid-2 { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            width: 100%; 
        }
        
        .btn { 
            width: 100%; 
            background: linear-gradient(135deg, #5b21b6, #1d4ed8); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            padding: 14px; 
            font-size: 14px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: 0.2s; 
        }
        .btn-register { background: #16a34a; }
        .btn:active { transform: scale(0.97); }
        
        .switch-text { font-size: 12px; color: #9ca3af; margin-top: 18px; }
        .switch-btn { background: none; border: none; color: #a855f7; font-weight: bold; cursor: pointer; text-decoration: underline; font-size: 12px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 🎯 Game Branding & Logo -->
        <span class="logo">🔮</span>
        <h1>N&N ALPHA ARENA</h1>
        <p class="tagline">The Ultimate 100 Persons Game</p>

        <!-- 🔑 1. LOGIN FORM -->
        <div id="loginSection">
            <h2>🔑 Player Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" name="mobile" maxlength="10" placeholder="Enter 10-digit number" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn">Enter Game</button>
            </form>
            <p class="switch-text">
                New Player? <button type="button" onclick="toggleForms()" class="switch-btn">Create New Account</button>
            </p>
        </div>

        <!-- 📝 2. REGISTRATION FORM -->
        <div id="registerSection" class="hidden">
            <h2>📝 New Registration</h2>
            <form id="registerForm">
                <div class="grid-2">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" placeholder="First Name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" placeholder="Last Name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" name="mobile" maxlength="10" placeholder="10-digit mobile number" required>
                </div>
                <div class="form-group">
                    <label>Gmail Address</label>
                    <input type="email" name="email" placeholder="example@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create strong password" required>
                </div>
                <button type="submit" class="btn btn-register">Secure Account</button>
            </form>
            <p class="switch-text">
                Already have an account? <button type="button" onclick="toggleForms()" class="switch-btn">Login Here</button>
            </p>
        </div>
    </div>

    <!-- 🔄 Form Switching Script -->
    <script>
        function toggleForms() {
            document.getElementById('loginSection').classList.toggle('hidden');
            document.getElementById('registerSection').classList.toggle('hidden');
        }
                document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const usernameInput = document.querySelector('input[name="mobile"]')?.value.trim() || "";
    const passwordInput = document.querySelector('input[name="password"]')?.value.trim() || "";

    if (!usernameInput || !passwordInput) {
        alert("Please enter both mobile number and password.");
        return;
    }

    try {
        const response = await fetch("https://arena-backen.onrender.com", {
            method: "POST",
            headers: { 
                "Content-Type": "application/json" 
            },
            body: JSON.stringify({ 
                username: usernameInput, 
                password: passwordInput 
            })
        });

        const data = await response.json();

        if (data.success) {
            localStorage.setItem("game_username", data.username);
            localStorage.setItem("game_balance", data.balance);

            if (data.type === "register") {
                alert("Registration successful! New account added.");
            } else {
                alert("Login successful!");
            }
            window.location.href = 'templates_dashboard.html';
        } else {
            alert("Login failed: " + data.message);
        }
    } catch (error) {
        console.error("Server Error:", error);
        alert("Database server connection failed. Please check your Render server.");
    }
});

        
    </script>
</body>
</html>
