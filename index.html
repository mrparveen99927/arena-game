<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N&N Alpha Arena - Welcome</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e293b); color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #1e293b; border: 1px solid #334155; padding: 30px; border-radius: 12px; width: 100%; max-width: 420px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 24px; color: #38bdf8; text-transform: uppercase; }
        .form-group { margin-bottom: 16px; }
        .name-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .name-row .form-group { flex: 1; margin-bottom: 0; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #94a3b8; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #ffffff; outline: none; }
        input:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 12px; background: #38bdf8; border: none; border-radius: 6px; color: #0f172a; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0ea5e9; }
        .toggle-text { text-align: center; margin-top: 20px; font-size: 14px; color: #94a3b8; }
        .toggle-text span { color: #38bdf8; cursor: pointer; font-weight: 600; }
        .hidden { display: none; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 6px; font-weight: bold; z-index: 1000; }
        .success { background: #10b981; color: white; }
        .error { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <div id="notificationBox" class="notification hidden"></div>

    <div class="container">
        <!-- लॉगिन सेक्शन -->
        <div id="loginSection">
            <h2>Arena Login</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Mobile Number / Email</label>
                    <input type="text" id="loginId" placeholder="Enter credentials" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                </div>
                <button type="submit">LOGIN</button>
            </form>
            <div class="toggle-text">Account नहीं है? <span onclick="toggleForms()">यहाँ Register करें</span></div>
        </div>

        <!-- रजिस्ट्रेशन सेक्शन -->
        <div id="registerSection" class="hidden">
            <h2>Arena Register</h2>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="name-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="regFirstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="regLastName" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="regMobile" required>
                </div>
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="regConfirmPassword" required>
                </div>
                <div class="form-group">
                    <label>Referral ID (Optional)</label>
                    <input type="text" id="regReferral">
                </div>
                <button type="submit">REGISTER</button>
            </form>
            <div class="toggle-text">पहले से अकाउंट है? <span onclick="toggleForms()">यहाँ Login करें</span></div>
        </div>
    </div>

    <script>
        // 🎯 आपका लाइव बैकएंड यूआरएल लिंक
        const BACKEND_URL = "https://arena-backen.onrender.com";

        function toggleForms() {
            document.getElementById('loginSection').classList.toggle('hidden');
            document.getElementById('registerSection').classList.toggle('hidden');
        }

        function showNotification(message, type = 'success') {
            const box = document.getElementById('notificationBox');
            box.innerText = message;
            box.className = `notification ${type}`;
            box.classList.remove('hidden');
            setTimeout(() => { box.classList.add('hidden'); }, 3000);
        }

        // असली डेटाबेस रजिस्ट्रेशन
        async function handleRegister(event) {
            event.preventDefault();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password !== confirmPassword) {
                showNotification("पासवर्ड मैच नहीं हो रहे हैं!", "error");
                return;
            }

            const formData = {
                firstName: document.getElementById('regFirstName').value,
                lastName: document.getElementById('regLastName').value,
                mobile: document.getElementById('regMobile').value,
                email: document.getElementById('regEmail').value,
                password: password,
                referral: document.getElementById('regReferral').value
            };

            try {
                const response = await fetch(`${BACKEND_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const result = await response.json();

                if (result.success) {
                    showNotification("Registration Successful!");
                    document.getElementById('registerForm').reset();
                    setTimeout(() => { toggleForms(); }, 1500);
                } else {
                    showNotification(result.message, "error");
                }
            } catch (err) {
                showNotification("सर्वर से कनेक्शन फेल!", "error");
            }
        }

        // असली डेटाबेस लॉगिन
        async function handleLogin(event) {
            event.preventDefault();
            const loginData = {
                loginId: document.getElementById('loginId').value,
                password: document.getElementById('loginPassword').value
            };

            try {
                const response = await fetch(`${BACKEND_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });
                const result = await response.json();

                if (result.success) {
                    showNotification("Login Successful! Redirecting...");
                    setTimeout(() => {
                        window.location.href = "templates_dashboard.html";
                    }, 1000);
                } else {
                    showNotification(result.message, "error");
                }
            } catch (err) {
                showNotification("डेटाबेस सर्वर कनेक्शन फेल!", "error");
            }
        }
    </script>
</body>
</html>
