<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Arena - Welcome Gateway</title>
    <style>
        /*          */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #030712; color: #f9fafb; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .auth-container { width: 100%; max-width: 420px; background: #0b0f19; border: 1px solid #1f2937; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); }
        .brand-header { text-align: center; margin-bottom: 25px; }
        .brand-header h1 { font-size: 28px; font-weight: 800; color: #eab308; text-transform: uppercase; letter-spacing: 1px; }
        .brand-header p { font-size: 13px; color: #9ca3af; margin-top: 5px; }
        .form-group { margin-bottom: 18px; position: relative; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #9ca3af; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input { width: 100%; padding: 12px 14px; background: #111827; border: 1px solid #374151; border-radius: 8px; color: #fff; font-size: 14px; outline: none; transition: all 0.2s ease; }
        .form-group input:focus { border-color: #eab308; box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.2); }
        .btn-submit { width: 100%; padding: 14px; background: #eab308; border: none; border-radius: 8px; color: #030712; font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: background 0.2s; margin-top: 10px; }
        .btn-submit:hover { background: #ca8a04; }
        .toggle-zone { text-align: center; margin-top: 20px; font-size: 14px; color: #9ca3af; }
        .toggle-zone span { color: #eab308; cursor: pointer; font-weight: 600; margin-left: 5px; }
        .toggle-zone span:hover { text-decoration: underline; }
        .hidden { display: none; }
        .error-alert { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #f87171; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <!--       -->
        <div class="error-alert" id="alertBox"></div>

        <!--     -->
        <div id="loginSection">
            <div class="brand-header">
                <h1>Alpha Arena</h1>
                <p>       </p>
            </div>
            <form id="loginForm" onsubmit="handleUserLogin(event)">
                <div class="form-group">
                    <label>   </label>
                    <input type="text" id="loginUsername" placeholder="Enter Mobile or Email" required>
                </div>
                <div class="form-group">
                    <label></label>
                    <input type="password" id="loginPassword" placeholder="Enter Password" required>
                </div>
                <button type="submit" class="btn-submit">Login Arena</button>
            </form>
            <div class="toggle-zone">
                  ? <span onclick="switchView('register')">Register Now</span>
            </div>
        </div>
                <!--     -->
        <div id="registerSection" class="hidden">
            <div class="brand-header">
                <h1>Create Account</h1>
                <p>     50   </p>
            </div>
            <form id="registerForm" onsubmit="handleUserRegister(event)">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="regFirst" placeholder="Enter First Name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="regLast" placeholder="Enter Last Name" required>
                </div>
                <div class="form-group">
                    <label> </label>
                    <input type="tel" id="regMobile" placeholder="Enter 10 digit Mobile" pattern="[0-9]{10}" required>
                </div>
                <div class="form-group">
                    <label> </label>
                    <input type="email" id="regEmail" placeholder="Enter Email Address" required>
                </div>
                <div class="form-group">
                    <label>  </label>
                    <input type="password" id="regPassword" placeholder="Minimum 6 characters" minlength="6" required>
                </div>
                <div class="form-group">
                    <label>  ()</label>
                    <input type="text" id="regReferral" placeholder="Enter Referral ID (If any)">
                </div>
                <button type="submit" class="btn-submit">Register Account</button>
            </form>
            <div class="toggle-zone">
                   ? <span onclick="switchView('login')">Login Here</span>
            </div>
        </div>
    </div>

    <script>
        //      
        const BACKEND_URL = "https://arena-backen.onrender.com";

        //    (   )
        function switchView(view) {
            const alertBox = document.getElementById("alertBox");
            alertBox.style.display = "none";
            if (view === 'register') {
                document.getElementById("loginSection").classList.add("hidden");
                document.getElementById("registerSection").classList.remove("hidden");
            } else {
                document.getElementById("registerSection").classList.add("hidden");
                document.getElementById("loginSection").classList.remove("hidden");
            }
        }

        //     
        function showAlert(msg, isSuccess = false) {
            const alertBox = document.getElementById("alertBox");
            alertBox.innerText = msg;
            alertBox.style.display = "block";
            if (isSuccess) {
                alertBox.style.background = "rgba(34, 197, 94, 0.1)";
                alertBox.style.borderColor = "#22c55e";
                alertBox.style.color = "#4ade80";
            } else {
                alertBox.style.background = "rgba(239, 68, 68, 0.1)";
                alertBox.style.borderColor = "#ef4444";
                alertBox.style.color = "#f87171";
            }
        }

        //     (MongoDB   )
        async function handleUserRegister(e) {
            e.preventDefault();
            const alertBox = document.getElementById("alertBox");
            alertBox.style.display = "none";

            const payload = {
                firstName: document.getElementById("regFirst").value.trim(),
                lastName: document.getElementById("regLast").value.trim(),
                mobile: document.getElementById("regMobile").value.trim(),
                email: document.getElementById("regEmail").value.trim(),
                password: document.getElementById("regPassword").value,
                referral: document.getElementById("regReferral").value.trim()
            };

            try {
                const res = await fetch(`${BACKEND_URL}/api/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();

                if (result.success) {
                    alert("  !  50       ");
                    document.getElementById("registerForm").reset();
                    switchView('login');
                } else {
                    showAlert(result.message || "   !");
                }
            } catch (err) {
                showAlert("     !      ");
            }
        }

        //     (   )
        async function handleUserLogin(e) {
            e.preventDefault();
            const alertBox = document.getElementById("alertBox");
            alertBox.style.display = "none";

            const usernameInput = document.getElementById("loginUsername").value.trim();
            const passwordInput = document.getElementById("loginPassword").value;

            try {
                const res = await fetch(`${BACKEND_URL}/api/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mobile: usernameInput, password: passwordInput })
                });
                const result = await res.json();

                if (result.success) {
                    //         
                    sessionStorage.setItem("userData", JSON.stringify(result.userData));
                    showAlert(" !      ...", true);
                    
                    // 1        
                    setTimeout(() => {
                        window.location.href = "templates_dashboard.html";
                    }, 1000);
                } else {
                    showAlert(result.message || "    !");
                }
            } catch (err) {
                showAlert("     ! `app.py`     ");
            }
        }
    </script>
</body>
</html>
