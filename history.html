<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Arena - Bet History</title>
    <style>
        /*          */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #030712; color: #f9fafb; min-height: 100vh; padding-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        
        .history-page-container { width: 100%; max-width: 480px; padding: 15px; }

        /*        */
        .header-card { background: #0b0f19; border: 1px solid #1f2937; border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .back-btn { background: #1f2937; border: 1px solid #374151; color: white; padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: background 0.2s; }
        .back-btn:hover { background: #374151; }
        .page-title { font-size: 16px; font-weight: 800; color: #eab308; text-transform: uppercase; letter-spacing: 0.5px; }

        /*      */
        .history-list-wrapper { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .history-card-item { background: #111827; border: 1px solid #1f2937; border-left: 4px solid #eab308; padding: 15px; border-radius: 12px; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .hist-top-row { display: flex; justify-content: space-between; font-weight: 700; color: #fff; font-size: 14px; }
        .hist-nums-list { color: #eab308; font-family: monospace; font-size: 15px; margin: 8px 0; font-weight: bold; letter-spacing: 0.5px; }
        .hist-bottom-row { display: flex; justify-content: space-between; color: #9ca3af; font-size: 12px; margin-top: 8px; border-top: 1px dashed #1f2937; padding-top: 8px; }
        
        .no-data-msg { color: #9ca3af; text-align: center; font-size: 13px; padding: 30px 10px; background: #0b0f19; border: 1px dashed #1f2937; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="history-page-container">
        
        <!--    -->
        <div class="header-card">
            <!--             -->
            <button class="back-btn" onclick="window.location.href='profile.html'"> Back</button>
            <span class="page-title">My Bet History</span>
        </div>

        <!--      -->
        <div class="history-list-wrapper" id="historyLogsContainer">
            <p style="color: #9ca3af; text-align: center; font-size: 13px;">   ...</p>
        </div>

    </div>

    <script>
        //      
        const BACKEND_URL = "https://arena-backen.onrender.com";

        document.addEventListener("DOMContentLoaded", () => {
            loadPlayerBetHistory();
        });

        //      MongoDB       
        async function loadPlayerBetHistory() {
            const container = document.getElementById("historyLogsContainer");
            const userData = JSON.parse(sessionStorage.getItem("userData"));

            //        
            if (!userData || !userData.mobile) {
                container.innerHTML = `<div class="no-data-msg">  :      !</div>`;
                return;
            }

            try {
                //              
                const res = await fetch(`${BACKEND_URL}/api/user-bets?mobile=${userData.mobile}`);
                const result = await res.json();

                if (result.status === "success" && result.bets && result.bets.length > 0) {
                    let betsList = result.bets;

                    //  WIN ( )         (Top)  
                    betsList.sort((a, b) => {
                        const statusA = a.status || "PENDING";
                        const statusB = b.status || "PENDING";
                        if (statusA === "WIN" && statusB !== "WIN") return -1;
                        if (statusA !== "WIN" && statusB === "WIN") return 1;
                        return 0;
                    });

                    container.innerHTML = ""; //       
                    
                    betsList.forEach(bet => {
                        const isWin = bet.status === "WIN";
                        const borderStyle = isWin ? "border-left: 5px solid #22c55e; background: rgba(34, 197, 94, 0.02);" : "border-left: 4px solid #eab308;";
                        
                        //      (DAILY_GALI  Gali Arena )
                        const clearMarketName = bet.round_id ? bet.round_id.replace("DAILY_", "") : "FARIDABAD";
                        const formattedMarket = clearMarketName.charAt(0).toUpperCase() + clearMarketName.slice(1).toLowerCase();
                        
                        const statusBadge = isWin ? 
                            `<span style="color: #4ade80; font-weight: 800;"> WIN (+ ${parseFloat(bet.payout).toFixed(2)})</span>` : 
                            `<span style="color: #eab308;">PENDING</span>`;

                        const card = document.createElement("div");
                        card.className = "history-card-item";
                        card.style = borderStyle;
                        
                        //         
                        const betNumbers = bet.numbers || [];
                        const ratePerNum = bet.amount || 10;
                        const totalBetAmount = betNumbers.length * ratePerNum;

                        card.innerHTML = `
                            <div class="hist-top-row">
                                <span>${formattedMarket} Arena</span>
                                ${statusBadge}
                            </div>
                            <div class="hist-nums-list">
                                Numbers: ${betNumbers.map(n => n < 10 ? "0"+n : n == 100 ? "100" : n).join(", ")}
                            </div>
                            <div class="hist-bottom-row">
                                <span>Rate: ${ratePerNum}/Num</span>
                                <span style="color: #fff;">Total Bet: <strong>${parseFloat(totalBetAmount).toFixed(2)}</strong></span>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = `<div class="no-data-msg">        !      </div>`;
                }
            } catch (err) {
                console.error("History Server Sync Error:", err);
                container.innerHTML = `<div class="no-data-msg" style="color: #ef4444;">       !      </div>`;
            }
        }
    </script>
</body>
</html>
