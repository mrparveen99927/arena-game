<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Arena - Bet History</title>
    <style>
        /* 🎨 अल्फा एरिना थीम पर आधारित डार्क प्रीमियम स्टाइल */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #030712; color: #f9fafb; min-height: 100vh; padding-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        
        .history-page-container { width: 100%; max-width: 480px; padding: 15px; }

        /* 🔙 टॉप हेडर बार और बैक बटन */
        .header-card { background: #0b0f19; border: 1px solid #1f2937; border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .back-btn { background: #1f2937; border: 1px solid #374151; color: #fff; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: background 0.2s; }
        .back-btn:hover { background: #374151; }
        .page-title { font-size: 16px; font-weight: 800; color: #eab308; text-transform: uppercase; letter-spacing: 0.5px; }

        /* 📜 बेट हिस्ट्री लॉग्स ज़ोन */
        .history-list-wrapper { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .history-card-item { background: #111827; border: 1px solid #1f2937; border-left: 4px solid #eab308; padding: 15px; border-radius: 12px; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .hist-top-row { display: flex; justify-content: space-between; font-weight: 700; color: #fff; font-size: 14px; }
        .hist-nums-list { color: #eab308; font-family: monospace; font-size: 15px; margin: 8px 0; font-weight: bold; letter-spacing: 0.5px; }
        .hist-bottom-row { display: flex; justify-content: space-between; color: #9ca3af; font-size: 12px; margin-top: 8px; border-top: 1px dashed #1f2937; padding-top: 8px; }
        
        .no-data-msg { color: #9ca3af; text-align: center; font-size: 13px; padding: 30px 10px; background: #0b0f19; border: 1px dashed #1f2937; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="history-page-container">
        
        <!-- टॉप हेडर बार -->
        <div class="header-card">
            <!-- 🔙 बैक बटन जो खिलाड़ी को वापस प्रोफाइल पेज पर भेज देगा -->
            <button class="back-btn" onclick="window.location.href='profile.html'">← Back</button>
            <span class="page-title">My Bet History</span>
        </div>

        <!-- लाइव बेट हिस्ट्री लिस्ट कंटेनर -->
        <div class="history-list-wrapper" id="historyLogsContainer">
            <p style="color: #9ca3af; text-align: center; font-size: 13px;">लोड हो रहा है...</p>
        </div>

    </div>

    <script>
        // 🔑 लाइव प्रोडक्शन रेंडर बैकएंड यूआरएल
        const BACKEND_URL = "https://onrender.com";

        document.addEventListener("DOMContentLoaded", () => {
            loadPlayerBetHistory();
        });

        // 📊 लोकल और लाइव डेटाबेस से खिलाड़ी की बेट हिस्ट्री खींचने का सॉर्टेड इंजन
        async function loadPlayerBetHistory() {
            const container = document.getElementById("historyLogsContainer");
            const userData = JSON.parse(sessionStorage.getItem("userData"));

            // लोकल ब्राउज़र मेमोरी से सेव की हुई बेट्स की सूची उठाना
            let betsList = JSON.parse(localStorage.getItem("arena_bet_history")) || [];

            // यदि कोई बेट नहीं है, तो साफ़ संदेश दिखाएं
            if (betsList.length === 0) {
                container.innerHTML = `<div class="no-data-msg">🎯 अभी तक आपने कोई बेट नहीं लगाई है! गेम ज़ोन में जाकर दांव लगाएं।</div>`;
                return;
            }

            // 🔥 WIN (जीतने वाली) बेट्स को छानकर पूरी लिस्ट में सबसे ऊपर (Top) सेट करने का सॉर्टिंग इंजन
            betsList.sort((a, b) => {
                if (a.status === "WIN" && b.status !== "WIN") return -1;
                if (a.status !== "WIN" && b.status === "WIN") return 1;
                return 0;
            });

            // यूआई कार्ड्स रेंडर करना (बिल्कुल आपके स्क्रीनशॉट वाले लुक में)
            container.innerHTML = "";
            betsList.forEach(bet => {
                const isWin = bet.status === "WIN";
                // जीतने पर बॉर्डर ग्रीन होगी, पेंडिंग पर पीली
                const borderStyle = isWin ? "border-left: 5px solid #22c55e; background: rgba(34, 197, 94, 0.02);" : "border-left: 4px solid #eab308;";
                const statusBadge = isWin ? `<span style="color: #4ade80; font-weight: 800;">🏆 WIN (+ can_sym_0₹${bet.payout})</span>` : `<span style="color: #eab308;">PENDING</span>`;

                const card = document.createElement("div");
                card.className = "history-card-item";
                card.style = borderStyle;
                
                card.innerHTML = `
                    <div class="hist-top-row">
                        <span>${bet.market} Arena</span>
                        ${statusBadge}
                    </div>
                    <div class="hist-nums-list">
                        Numbers: ${bet.numbers.map(n => n < 10 ? "0"+n : n == 100 ? "100" : n).join(", ")}
                    </div>
                    <div class="hist-bottom-row">
                        <span>Rate: ₹${bet.rate}/Num</span>
                        <span style="color: #fff;">Total Bet: <strong>₹${bet.total.toFixed(2)}</strong></span>
                    </div>
                `;
                container.appendChild(card);
            });

            // लाइव रेंडर बैकएंड सर्वर से डेटा सिंक करने की कोशिश करना (बैकग्राउंड में)
            try {
                if (userData && userData.mobile) {
                    const res = await fetch(`${BACKEND_URL}/api/admin/dashboard-sheet`);
                    const data = await res.json();
                    console.log("डेटाबेस से लाइव इतिहास सिंक हुआ!");
                }
            } catch (err) {
                console.log("रेंडर सर्ver बैकअप मोड में है।");
            }
        }
    </script>
</body>
</html>
