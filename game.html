<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Arena - Live Game Zone</title>
    <style>
        /*    -    */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #030712; color: #f9fafb; min-height: 100vh; padding-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        
        .game-container { width: 100%; max-width: 480px; padding: 15px; }
        
        /*       */
        .header-card { background: #0b0f19; border: 1px solid #1f2937; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .page-title { font-size: 16px; font-weight: 800; color: #eab308; text-transform: uppercase; }
        .wallet-display { background: #111827; border: 1px solid #374151; padding: 6px 12px; border-radius: 20px; font-weight: 700; color: #4ade80; font-size: 14px; }
        
        /*      */
        .timer-banner { width: 100%; background: rgba(34, 197, 94, 0.1); border: 1px solid #22c55e; color: #4ade80; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 15px; font-weight: 600; }
        .timer-banner.locked { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; color: #f87171; }

        /*      */
        .control-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .ctrl-btn { flex: 1; padding: 8px; background: #1f2937; border: 1px solid #374151; color: #fff; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: background 0.2s; }
        .ctrl-btn:hover { background: #374151; }
        .ctrl-clear { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #f87171; }
        .ctrl-clear:hover { background: rgba(239, 68, 68, 0.3); }

        /*  1  100     */
        .matrix-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #0b0f19; border: 1px solid #1f2937; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .num-btn { background: #111827; border: 1px solid #374151; border-radius: 8px; padding: 12px 0; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s ease; }
        .num-btn:hover { border-color: #eab308; }
        .num-btn.selected-num { background: #eab308; color: #030712; border-color: #ca8a04; box-shadow: 0 0 8px rgba(234, 179, 8, 0.4); }
        .num-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #374151 !important; background: #111827 !important; color: #9ca3af !important; }

        /*          */
        .bet-panel { background: #0b0f19; border: 1px solid #1f2937; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .live-selection-display { font-size: 13px; color: #eab308; background: #111827; padding: 10px; border-radius: 8px; border: 1px dashed #374151; margin-bottom: 12px; min-height: 38px; line-height: 1.4; word-break: break-all; }
        .input-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 12px; }
        .input-row label { font-size: 12px; font-weight: 600; color: #9ca3af; text-transform: uppercase; }
        .coin-input { width: 120px; padding: 8px 12px; background: #111827; border: 1px solid #374151; border-radius: 6px; color: #fff; text-align: center; font-size: 15px; font-weight: 700; outline: none; }
        .coin-input:focus { border-color: #eab308; }
        .summary-text { font-size: 14px; color: #fff; display: flex; justify-content: space-between; border-top: 1px solid #1f2937; padding-top: 12px; }
        .summary-text span strong { color: #4ade80; font-size: 16px; }

        .btn-confirm-trigger { width: 100%; padding: 14px; background: #eab308; color: #030712; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 5px; }
        .btn-confirm-trigger:hover { background: #ca8a04; }
        .btn-confirm-trigger:disabled { background: #374151; color: #9ca3af; cursor: not-allowed; }

        /*      (Bet Slip Modal Overlay) */
        .review-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(3, 7, 18, 0.9); display: flex; justify-content: center; align-items: center; padding: 20px; z-index: 1000; display: none; }
        .review-modal-card { width: 100%; max-width: 400px; background: #0b0f19; border: 1px solid #374151; border-radius: 16px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); }
        .modal-header { font-size: 18px; font-weight: 800; color: #eab308; text-transform: uppercase; border-bottom: 1px solid #1f2937; padding-bottom: 10px; margin-bottom: 15px; text-align: center; }
        .review-item { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; color: #9ca3af; }
        .review-item span strong { color: #fff; }
        .review-box-list { background: #111827; border: 1px solid #1f2937; padding: 10px; border-radius: 8px; color: #eab308; font-weight: 700; font-size: 13px; max-height: 80px; overflow-y: auto; margin-bottom: 15px; word-break: break-all; line-height: 1.4; }
        .modal-action-row { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-modal-cancel { background: #1f2937; color: #fff; border: 1px solid #374151; }
        .btn-modal-submit { background: #22c55e; color: #fff; }
        .btn-modal-submit:hover { background: #16a34a; }
    </style>
</head>
<body>

    <div class="game-container">
        
               <!--   ,      -->
        <div class="header-card">
            <div style="display: flex; align-items: center; gap: 10px;">
                <!--          -->
                <button onclick="window.location.href='templates_dashboard.html'" style="background: #1f2937; border: 1px solid #374151; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer;"> Back</button>
                <span class="page-title" id="marketTitleDisplay">Faridabad Arena</span>
            </div>
            <span class="wallet-display">Wallet: <span id="currentWallet">0.00</span></span>
        </div>
        

        <!--      -->
        <div class="timer-banner" id="gameTimerMsg">   ...</div>

        <!--     -->
        <div class="control-row">
            <button class="ctrl-btn" onclick="quickSelect('all')">Select All</button>
            <button class="ctrl-btn" onclick="quickSelect('even')">Even</button>
            <button class="ctrl-btn" onclick="quickSelect('odd')">Odd</button>
            <button class="ctrl-btn ctrl-clear" onclick="clearAll()">Clear All</button>
        </div>

        <!-- 1  100    -->
        <div class="matrix-grid" id="matrixGrid"></div>
        <!--      -->
        <div class="bet-panel">
            <!--          -->
            <div class="live-selection-display" id="selectedDisplay">Selected Numbers: None</div>
            
            <div class="input-row">
                <label>Amount Per Number ():</label>
                <input type="number" class="coin-input" id="coinInput" value="10" min="5" max="100" oninput="calcTotal()">
            </div>
            
            <div class="summary-text">
                <span>Selected Count: <strong id="selectedCount">0</strong></span>
                <span>Total Amount: <strong id="totalBet">0</strong></span>
            </div>
            
            <button class="btn-confirm-trigger" id="submitBetBtn" onclick="openBetSummaryModal()">Confirm Bet</button>
        </div>
    </div>

    <!--      (Bet Slip Page Overlay) -->
    <div class="review-modal-overlay" id="betSummaryModal">
        <div class="review-modal-card">
            <div class="modal-header">Review Bet Slip</div>
            
            <div class="review-item">
                <span>Selected Count:</span>
                <span><strong id="popTotalNumbers">0</strong> Nos</span>
            </div>
            
            <!--          -->
            <div class="review-box-list" id="popSelectedList">None</div>
            
            <div class="review-item">
                <span>Rate Per Number:</span>
                <span><strong id="popAmtPerNum">0</strong></span>
            </div>
            
            <div class="review-item" style="border-top: 1px dashed #374151; padding-top: 10px; margin-top: 10px;">
                <span style="color: #fff; font-weight: bold;">Total Wallet Deduct:</span>
                <span style="color: #4ade80; font-weight: bold; font-size: 16px;"><strong id="popTotalBet">0</strong></span>
            </div>
            
            <div class="modal-action-row">
                <button class="modal-btn btn-modal-cancel" onclick="closeBetModal()">Cancel</button>
                <button class="modal-btn btn-modal-submit" onclick="submitFinalBetToDB()">Confirm & Submit</button>
            </div>
        </div>
    </div>

    <script>
        //      
        const BACKEND_URL = "https://arena-backen.onrender.com";
        var selectedArr = [];
        var isGameLocked = false;

        // URL      
        const urlParams = new URLSearchParams(window.location.search);
        const currentMarket = urlParams.get('market') || "Faridabad";
        document.getElementById("marketTitleDisplay").innerText = `${currentMarket} Arena`;

        //  1  100   - 
        document.addEventListener("DOMContentLoaded", () => {
            const sessionData = sessionStorage.getItem("userData");
            if (!sessionData) {
                alert("  :    !");
                window.location.href = "index.html";
                return;
            }
            const userData = JSON.parse(sessionData);
            document.getElementById("currentWallet").innerText = ` can_sym_0${parseFloat(userData.balance).toFixed(2)}`;

            // 1  100   (Buttons) 
            const grid = document.getElementById("matrixGrid");
            grid.innerHTML = "";
            for (let i = 1; i <= 100; i++) {
                let btn = document.createElement("button");
                btn.className = "num-btn";
                // 01, 02   99, 100    
                btn.innerText = i < 10 ? "0" + i : i == 100 ? "100" : i;
                btn.id = "nBtn_" + i;
                btn.setAttribute("onclick", `toggleNum(${i})`);
                grid.appendChild(btn);
            }

            //  4:40 PM -     
            checkGameLockStatus();
            setInterval(checkGameLockStatus, 5000); //  5    
        });

        //       
        function toggleNum(num) {
            if (isGameLocked) return;
            const btn = document.getElementById("nBtn_" + num);
            const idx = selectedArr.indexOf(num);

            if (idx === -1) {
                selectedArr.push(num);
                btn.classList.add("selected-num");
            } else {
                selectedArr.splice(idx, 1);
                btn.classList.remove("selected-num");
            }
            selectedArr.sort((a, b) => a - b);
            updateGameUI();
        }

        //      
        function updateGameUI() {
            document.getElementById("selectedCount").innerText = selectedArr.length;
            
            //     -      
            if (selectedArr.length === 0) {
                document.getElementById("selectedDisplay").innerText = "Selected Numbers: None";
            } else {
                const formattedNums = selectedArr.map(n => n < 10 ? "0" + n : n == 100 ? "100" : n);
                document.getElementById("selectedDisplay").innerText = "Selected Numbers: " + formattedNums.join(", ");
            }
            calcTotal();
        }

        //     
        function calcTotal() {
            const amt = parseInt(document.getElementById("coinInput").value);
            const totalDisplay = document.getElementById("totalBet");
            if (!amt || amt <= 0 || selectedArr.length === 0) {
                totalDisplay.innerText = "0";
                return 0;
            }
            const total = selectedArr.length * amt;
            totalDisplay.innerText = total;
            return total;
        }

        //    (Select All, Even, Odd)
        function quickSelect(type) {
            if (isGameLocked) return;
            clearAll();
            for (let i = 1; i <= 100; i++) {
                if (type === 'all') toggleNum(i);
                else if (type === 'even' && i % 2 === 0) toggleNum(i);
                else if (type === 'odd' && i % 2 !== 0) toggleNum(i);
            }
        }

        //   
        function clearAll() {
            if (isGameLocked) return;
            selectedArr = [];
            const buttons = document.querySelectorAll(".num-btn");
            buttons.forEach(btn => btn.classList.remove("selected-num"));
            updateGameUI();
        }

        //       (Review Slip)
        function openBetSummaryModal() {
            const amtPerNumber = parseInt(document.getElementById("coinInput").value);
            if (selectedArr.length === 0) { alert("        !"); return; }
            if (!amtPerNumber || amtPerNumber < 5 || amtPerNumber > 100) { alert(" :    5   100 !"); return; }

            document.getElementById("popTotalNumbers").innerText = selectedArr.length;
            document.getElementById("popAmtPerNum").innerText = amtPerNumber;
            
            const formattedNums = selectedArr.map(n => n < 10 ? "0" + n : n == 100 ? "100" : n);
            document.getElementById("popSelectedList").innerText = formattedNums.join(", ");
            
            document.getElementById("popTotalBet").innerText = selectedArr.length * amtPerNumber;
            document.getElementById("betSummaryModal").style.display = "flex";
        }

        function closeBetModal() {
            document.getElementById("betSummaryModal").style.display = "none";
        }

        //     (100%  )
async function submitFinalBetToDB() {
    //           
    const amtPerNumber = parseInt(document.getElementById("coinInput").value);
    const userData = JSON.parse(sessionStorage.getItem("userData"));

    if (!userData || !userData.mobile) {
        alert("      !    ");
        window.location.href = "index.html";
        return;
    }

    try {
        const res = await fetch(`${BACKEND_URL}/api/place-bet`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                user_id: userData.mobile,
                numbers: selectedArr,
                amount: amtPerNumber,
                round_id: "DAILY_" + currentMarket.toUpperCase()
            })
        });
        const result = await res.json();

        if (result.status === "success") {
            alert("              !");
            
            //            (can_sym   )
            document.getElementById("currentWallet").innerText = `${parseFloat(result.new_balance).toFixed(2)}`;
            
            //    
            userData.balance = result.new_balance;
            sessionStorage.setItem("userData", JSON.stringify(userData));
            
            closeBetModal();
            clearAll();
        } else {
            alert("  : " + result.message);
        }
    } catch (err) {
        console.error("Deduction Error Log:", err);
        alert("    !      'app.py'    ");
    }
}

        //  4:40 PM -   Function
        async function checkGameLockStatus() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/game-status`);
                const result = await res.json();
                const banner = document.getElementById("gameTimerMsg");
                const submitBtn = document.getElementById("submitBetBtn");

                                if (result.status === "closed") {
                    isGameLocked = true;
                    banner.innerText = " " + result.message;
                    banner.classList.add("locked");
                    submitBtn.disabled = true;
                    
                    //       
                    document.querySelectorAll(".num-btn").forEach(btn => btn.disabled = true);
                } else {
                    isGameLocked = false;
                    banner.innerText = " Betting is Open & Live!";
                    banner.classList.remove("locked");
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.log("Timer status sync pending...");
            }
        }
    </script>
</body>
</html>
